server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # ── Proxy vers l'API FastAPI ─────────────────────────────
    location /api/ {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /health {
        proxy_pass http://api:8000;
    }

    # ── Routing React SPA ────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}